# Tag-triggered release: push a v* tag and this builds the Cardputer ADV
# firmware, merges it into a single-offset .bin, and attaches the artifact
# to a GitHub Release. M5Burner's "Open Custom Firmware" takes the .bin
# directly, and so does `esptool write_flash 0x0`.
#
# Usage:
#   git tag -a v1.0.1 -m "v1.0.1"
#   git push cardputer-fork v1.0.1
#
# The workflow handles everything after the tag push — install PIO, build,
# rename the artifact with the tag, publish the release.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build + release Cardputer ADV firmware
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # PlatformIO's tool packages are big; cache them so repeat builds
      # land in ~30s instead of ~3 min.
      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.cache/pip
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build Cardputer ADV firmware
        run: pio run -e cardputer-adv

      # merge_bin.py writes release/cardputer-adv-merged.bin; rename to
      # include the tag so downloads from the Releases page are
      # self-describing. Use the raw tag (refs/tags/vX.Y.Z → vX.Y.Z).
      - name: Rename artifact with tag
        run: |
          TAG="${GITHUB_REF##*/}"
          mv release/cardputer-adv-merged.bin \
             "release/claude-buddy-cardputer-${TAG}.bin"
          ls -la release/

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release/claude-buddy-cardputer-*.bin
          generate_release_notes: true
          draft: false
          prerelease: false
